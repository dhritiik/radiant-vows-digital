<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon / Logos -->
  <link rel="icon" type="image/svg+xml" href="/logo-heart.svg" />


  <!-- Primary SEO -->
  <title>Yours Truly | Premium Digital Event Invitations</title>
  <meta name="description"
    content="Smart digital invitation platform. Personalized invites with guest names, event filtering & seat counts. WhatsApp-ready links. No tech skills needed." />
  <meta name="author" content="Yours Truly" />
  <meta name="robots" content="index, follow" />
  <meta name="keywords"
    content="digital wedding invitation, personalized invite, smart invitation India, WhatsApp invite link, digital event invite" />
  <link rel="canonical" href="https://radiant-vows.digital/" />

  <!-- Open Graph -->
  <meta property="og:title" content="Yours Truly | Premium Digital Event Invitations" />
  <meta property="og:description"
    content="Breathtaking personalized digital event invitations crafted uniquely for each of your guests." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://radiant-vows.digital/" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Yours Truly | Digital Invitations" />
  <meta name="twitter:description"
    content="Breathtaking personalized digital event invitations crafted uniquely for each of your guests." />

  <!-- Performance: Preconnect to Google Fonts BEFORE the CSS loads -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Preload the font CSS as non-render-blocking using print trick -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet" />
  </noscript>

  <!-- Structured Data (JSON-LD) for SEO -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Yours Truly",
      "description": "India's first smart personalized digital event invitation platform",
      "url": "https://radiant-vows.digital/",
      "areaServed": "IN",
      "serviceType": "Digital Event Invitations"
    }
    </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
